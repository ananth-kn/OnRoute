<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnRoute</title>
     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
</head>

<body>
    
    <div id="map">
    <div id="save-div">
    <button id="savebtn" onclick="buttonclick()">Save</button>
    </div>
    </div>
<style>
  #map { height: 100vh; width: 100%;}
  #savebtn{width: 100px; height: 30px;}
  #save-div {display: flex; justify-content: center; margin-top: 20px;}
  #savebtn{
    padding: 8px 16px;
    position: absolute;
    bottom: 30px;
    z-index: 1000;;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    width: fit-content;
    transition: all 0.2s ease;
    height: fit-content;
    }
    #savebtn:hover{
        background: #444;
    }
</style>

<script>
let delivery = null
const token = "{{ customer_token }}"
const map = L.map('map').setView([12.9716, 77.5946], 13)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{  maxZoom: 20,  detectRetina: true}).addTo(map)
const driverIcon = L.icon({iconUrl: "/static/car.png",iconSize: [40, 40],iconAnchor: [20, 40]})

async function startTracking() {
    document.getElementById("savebtn").style.display="none"
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";
    var socket = new WebSocket(`${protocol}://${window.location.host}/ws/deliveries/customers/${token}`);
    var driverMarker = L.marker([12, 77], {icon:driverIcon}).addTo(map)
    const locationlat = delivery.customer_lat
    const locationlng = delivery.customer_lng
    L.marker([locationlat, locationlng]).addTo(map)

    socket.onmessage = function(event) {
        var data = JSON.parse(event.data)
        driverMarker.setLatLng([data.lat, data.lng])
        // map.setView([data.lat, data.lng])
    }
}

let marker = null
async function pinLocation(e) {
    var lat = e.latlng.lat
    var lng = e.latlng.lng
    
    if (marker) {
        marker.setLatLng([lat, lng])
    } else {
        marker = L.marker([lat, lng]).addTo(map)
    }
    
}

async function buttonclick(){
        if(!marker){
            console.error("No location selected")
            alert("No location selected")
        }
        else{
        map.off('click', pinLocation)
        let lat = marker.getLatLng().lat
        let lng = marker.getLatLng().lng
        let patch = await fetch('/customers/location/{{ customer_token }}', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lat: lat, lng: lng })
        })
        if(patch.ok){
            startTracking()
        }
        }
}
    
    
async function init() {
    const d = await fetch(`/deliveries/customers/${token}`)
    delivery = await d.json()
    if (delivery.customer_lat) {
        startTracking()
    }
    else{
        document.getElementById("savebtn").style.display="block"
        map.on('click', pinLocation)
    }
    

}
init()

</script>
</body>

</html>
